name: Daily DevSync Update

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 23f3003555@ds.study.iitm.ac.in
        run: echo "DevSync verification step"

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f3003555@ds.study.iitm.ac.in"

      - name: Make change
        run: |
          echo "Update: $(date)" >> devsync_log.txt

      - name: Commit
        run: |
          git add .
          git commit -m "Daily automated commit" || echo "No changes"

      - name: Push
        run: git push
